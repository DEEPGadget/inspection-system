name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.2-alpine
        ports: [6379:6379]
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inspector
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: inspection_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Shellcheck (검수 스크립트)
        run: |
          find checks/ -name "*.sh" -exec shellcheck {} +

      - name: Test (pytest)
        env:
          DATABASE_URL: postgresql+asyncpg://inspector:testpass@localhost:5432/inspection_test
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: sk-ant-test-dummy
        run: pytest tests/ -v --tb=short
